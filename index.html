<!DOCTYPE html>
<html>

<head>
    <title>Foodie Hub</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>🍔 Foodie Hub</h1>
        <p>Order Your Favorite Food</p>
    </header>

    <div class="container">

        <div class="card">
            <img src="images/biryani.jpg">
            <h2>Biryani</h2>
            <p>₹250</p>
            <button onclick="addToCart('Biryani',250)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/pizza.jpg">
            <h2>Pizza</h2>
            <p>₹300</p>
            <button onclick="addToCart('Pizza',300)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/burger.jpg">
            <h2>Burger</h2>
            <p>₹150</p>
            <button onclick="addToCart('Burger',150)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/naan.jpg">
            <h2>Naan</h2>
            <p>₹80</p>
            <button onclick="addToCart('Naan',80)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/chapathi.jpg">
            <h2>Chapathi</h2>
            <p>₹60</p>
            <button onclick="addToCart('Chapathi',60)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/cake.jpg">
            <h2>Cake</h2>
            <p>₹200</p>
            <button onclick="addToCart('Cake',200)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/cooldrinks.jpg">
            <h2>Cool Drinks</h2>
            <p>₹50</p>
            <button onclick="addToCart('Cool Drinks',50)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/dosa.jpg">
            <h2>Dosa</h2>
            <p>₹120</p>
            <button onclick="addToCart('Dosa',120)">
                Add to Cart
            </button>
        </div>

        <div class="card">
            <img src="images/icecream.jpg">
            <h2>Ice Cream</h2>
            <p>₹100</p>
            <button onclick="addToCart('Ice Cream',100)">
                Add to Cart
            </button>
        </div>

    </div>

    <div class="cart">
        <h2>🛒 Cart</h2>

        <ul id="cart-items"></ul>

        <h3>Total: ₹<span id="total">0</span></h3>

        <button class="checkout">
            Checkout
        </button>
    </div>

    <script src="script.js"></script>

</body>

</html>
